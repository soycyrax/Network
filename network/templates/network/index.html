{% extends "network/layout.html" %}

{% block body %}

<div class="p-3">
    <h2>All Posts</h2>

    {% if error %}
    <p>{{ error }}</p>
    {% endif %}

    <div class="container">
        <form action="{% url 'create' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <h3 class="mb-4">New Post</h3>
                <textarea class="form-control" id="content" name="newpost" rows="3" cols="20"></textarea>
                <div class="mt-3">
                    <P><button type="submit" class="btn btn-primary">Post</button></P>
                </div>
            </div>
        </form>
    </div>



    {% for post in posts %}
    <div class="container">
        <h3>{{ post.created_by }}</h3>
        <p>{{ post.post }}</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
